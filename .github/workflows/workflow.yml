name: workflow_file
on: 
  workflow_dispatch:  
jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      matrix: 
        os: [ubuntu-latest]
        version: [11, 17]
    steps:
      - name: checkout 
        uses: actions/checkout@v4
      - name: check directory using pwd
        run: pwd
      - name: check directory using context variable
        run: echo 'the path is ${{github.workspace}}'
      - name: setup java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: ${{matrix.version}}
      - name: store cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.m2/repository
          key: maven-${{hashFiles('pom.xml')}}
      - name: build with maven
        run: mvn clean install
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout 
        uses: actions/checkout@v4
      - name: testing java application
        run: mvn test
    
      
      
  
